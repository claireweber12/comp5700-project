element45:
  name: Endpoint Private Access
  requirements:
    req1: "Authorized networks are a way of specifying a restricted range of IP addresses\
      \ that are permitted to access your cluster's control plane from the public\
      \ internet. Kubernetes Engine uses both Transport Layer Security (TLS) and authentication\
      \ to provide secure access to your cluster's control plane from the public internet.\
      \ This provides you the flexibility to administer your cluster from anywhere;\
      \ however, you might want to further restrict access to a set of IP addresses\
      \ that you control. You can set this restriction by specifying an authorized\
      \ network. Restricting access to an authorized network can provide additional\
      \ security benefits for your container cluster, including: \u2022 Better protection\
      \ from outsider attacks: Authorized networks provide an additional layer of\
      \ security by limiting external access to a specific set of addresses you designate,\
      \ such as those that originate from your premises. This helps protect access\
      \ to your cluster in the case of a vulnerability in the cluster's authentication\
      \ or authorization mechanism. \u2022 Better protection from insider attacks:\
      \ Authorized networks help protect your cluster from accidental leaks of master\
      \ certificates from your company's premises. Leaked certificates used from outside\
      \ Cloud Services and outside the authorized IP ranges (for example, from addresses\
      \ outside your company) are still denied access."
