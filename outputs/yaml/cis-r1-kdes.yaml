element1:
  name: Amazon EKS
  requirements:
    req1: Control plane logs provide visibility into operation of the EKS Control
      plane component systems.
    req2: Ensure that all options are set to 'Enabled'.
    req3: Manage Kubernetes RBAC users with AWS IAM Authenticator for Kubernetes
element10:
  name: read-only-port
  requirements:
    req1: Ensure that the --read-only-port argument exists and is set to 0.
element11:
  name: streamingConnectionIdleTimeout
  requirements:
    req1: If the streaming-connection-idle-timeout argument is not present in the
      output of the above command, refer instead to the config argument that specifies
      the location of the Kubelet config file e.g. --config /etc/kubernetes/kubelet/kubelet-config.json
    req2: 'If using the api configz endpoint consider searching for the status of
      "streamingConnectionIdleTimeout": by extracting the live configuration from
      the nodes running kubelet.'
element12:
  name: protect-kernel-defaults
  requirements:
    req1: protect-kernel-defaults=true
element13:
  name: security configurations
  requirements:
    req1: security configurations should be maintained
    req2: The --eventRecordQPS argument is set to 0 or a level which ensures appropriate
      event capture (Automated)
element14:
  name: RotateCertificate
  requirements:
    req1: RotateCertificate is set to true
element15:
  name: RotateKubeletServerCertificate
  requirements:
    req1: RotateKubeletServerCertificate argument exists in the featureGates section
      and is set to true.
element16:
  name: Container-optimized OS
  requirements:
    req1: Container-optimized OS is designed for secure managed hosting of containers
      on compute instances.
element17:
  name: Kubernetes Roles and ClusterRoles
  requirements:
    req1: Minimize wildcard use in Roles and ClusterRoles (Manual)
element18:
  name: system:masters
  requirements: {}
element19:
  name: system:controller:clust
  requirements: {}
element2:
  name: kubeconfig file
  requirements:
    req1: set to 644 or more restrictive
element20:
