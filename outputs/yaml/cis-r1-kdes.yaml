element1:
  name: Amazon EKS
  requirements:
    req1: Control plane logs provide visibility into operation of the EKS Control
      plane component systems.
    req2: Ensure that all options are set to 'Enabled'.
    req3: Manage Kubernetes RBAC users with AWS IAM Authenticator for Kubernetes
element10:
  name: streamingConnectionIdleTimeout
  requirements:
    req1: If the streaming-connection-idle-timeout argument is not present in the
      output of the above command, refer instead to the config argument that specifies
      the location of the Kubelet config file e.g. --config /etc/kubernetes/kubelet/kubelet-config.json
    req2: 'If using the api configz endpoint consider searching for the status of
      "streamingConnectionIdleTimeout": by extracting the live configuration from
      the nodes running kubelet.'
element11:
  name: proxy/configz
  requirements:
    req1: proxy/configz should be set to true
element12:
  name: protect-kernel-defaults
  requirements:
    req1: protect-kernel-defaults=true
element13:
  name: security configurations
  requirements:
    req1: Ensure that the --hostname-override argument does not exist in the output
      of the above command.
element14:
  name: RotateKubeletServerCertificate
  requirements:
    req1: Ensure that the RotateKubeletServerCertificate argument is set to true (Automated)
    req2: RotateKubeletServerCertificate argument exists in the featureGates section
      and is set to true
element15:
  name: Container-optimized OS
  requirements:
    req1: Use standard hardening configuration templates for application infrastructure
      components.
element16:
  name: Kubernetes API
  requirements:
    req1: Minimize access to secrets
element17:
  name: system:masters
  requirements:
    req1: access to create pods should be restricted to the smallest possible group
      of users.
element18:
  name: system:controllers
  requirements:
    req1: access to create pods should be restricted to the smallest possible group
      of users.
element19:
  name: system:controller
  requirements:
    req1: access to create pods should be restricted to the smallest possible group
      of users.
element2:
  name: kubeconfig file
  requirements:
    req1: Ensure that the kubelet kubeconfig file is set to root:root
element20:
  name: serviceAccount
  requirements:
    req1: access to create pods should be restricted to the smallest possible group
      of users.
element21:
  name: clusterrole-aggregation-controller
  requirements:
    req1: access to create pods should be restricted to the smallest possible group
      of users.
element22:
  name: persistent-volume-binder
  requirements:
    req1: access to create pods should be restricted to the smallest possible group
